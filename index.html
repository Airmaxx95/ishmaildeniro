.card.work-card.no-text

/* Fix work-text scrolling with vertical-centered grid */
.work-text{

}

/* === Robust scroll containment for long work text === */
.card.work-card{

.card.work-card .work-footer{

}

/* === Preserve original grid height while keeping scroll containment === */
.card.work-card{

}

/* Header/meta area stays natural height; grid fills remaining space; footer pins to bottom */
.card.work-card .work-grid{
  flex:1 1 auto;

}

/* Restore vertical centering feel without shrinking: stretch cells, center their inner stacks */

}

/* Work text scroll containment */

}

.media-column{
  min-height:0;

  justify-content:center;
}

/* Footer in flow, pinned to bottom via flex */


/* === Footer restored to fixed bottom without shrinking grid === */
.card.work-card{
  position:relative;
}

.card.work-card .work-footer{
  position:absolute;
  left:30px;
  right:30px;

}

/* Reserve space for fixed footer so grid content never overlaps */
.card.work-card .work-grid{

/* === Work-text bottom fade (fixed, non-scrolling) === */
.work-text{
  position: relative;
}

.work-text .scroll-fade{
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 44px;

  opacity: 0;
  transition: opacity 180ms ease;

.work-text.has-overflow .scroll-fade{

/* === Lightbox === */
.lightbox-overlay{
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  z-index: 9999;
}
.lightbox-overlay.active{
  opacity: 1;
  pointer-events: auto;
}
.lightbox-inner{
  width: 80%;
  max-width: 1100px;
  height: 80%;
  max-height: 80vh;
  background: #e5e7e8;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lightbox-media{
  width: 90%;
  height: calc(100% - 96px); /* reserves space for slug/close + footer */
  border-radius: 0;
  overflow: hidden;
  background: transparent;
  padding: 14px;           /* inset content (and scrollbar) away from rounded outer corners */
  box-sizing: border-box;
}
.lightbox-close{
  position: absolute;
  top: 16px;
  right: 20px;
  cursor: pointer;
  font-size: 14px;
  letter-spacing: 0.05em;
  background: transparent;
  border: 0;
  padding: 0;
}
.media-box{
  cursor: pointer;
  pointer-events: auto;
}


.lightbox-slug{
  position:absolute;
  top:16px;
  left:20px;
  font-size: 12px;
  letter-spacing: 0.02em;
}


.lightbox-footer{
  position:absolute;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:12px;
  text-align:center;
}
.lightbox-footer a{
  text-decoration:none;
  color:inherit;
}


.lightbox-media{
  border-radius:16px;
  overflow:hidden;
  background: transparent;
}
.lightbox-track{
  width:100%;
  height:100%;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling: touch;
}
.lightbox-slide{
  flex: 0 0 100%;
  height: 100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 24px;
  box-sizing: border-box;
  scroll-snap-align:center;
}
.lightbox-slide img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
  border-radius:16px;
  display:block;
}

/* =========================
   GLOBAL SCROLLBAR SYSTEM (Rounded)
   Thin black → 204 255 0 on hover/active
========================= */

/* Firefox */
* {
  scrollbar-width: thin;
  scrollbar-color: #000000 transparent;
}

/* WebKit (Chrome, Safari, Edge) */
*::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

*::-webkit-scrollbar-track {
  background: transparent;
}

*::-webkit-scrollbar-thumb {
  background: #000000;
  border-radius: 999px;
  transition: background 0.2s ease;
}

*::-webkit-scrollbar-thumb:hover {
  background: #DEFF00;
}

*::-webkit-scrollbar-thumb:active {
  background: #DEFF00;
}


/* === Work Text Top Scroll Fade === */
.work-text {
  position: relative;
}

.work-text::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;

  transition: opacity 0.2s ease;

}

.work-text.has-top-fade::before {

}

   Black → 204 255 0 on hover/active (fade)
========================= */

a,
button.linklike,
button.work-link,
button.sidebar-link,
#returnHome,
.lightbox-close {

/* =========================
   WORK CARD GRID HEIGHT FIX
   Ensure work-grid fills available vertical space between header/meta and footer
========================= */

/* Make each work-card a vertical layout container */
.work-card{
  display:flex;
  flex-direction:column;
}

/* Ensure header/meta area doesn't steal space unexpectedly */
.work-card .work-header{
  flex: 0 0 auto;
}

/* Footer already fixed/anchored; keep content area sizing robust */
.work-card .work-footer{
  flex: 0 0 auto;
}

/* The grid should take the remaining height */
.work-card .work-grid{
  flex: 1 1 auto;
  min-height: 0;          /* critical for overflow children */
  height: auto !important; /* override any old fixed heights */
}

/* When in two-column mode, keep both columns visually full-height */
.work-card .work-grid.has-text .work-text,
.work-card .work-grid.has-text .media-column{
  height: 100%;
  min-height: 0;
}

/* Text-only (no media) mode should still occupy full grid height, then center content inside */
.work-card .work-grid.no-media .work-text{
  height: 100%;
  min-height: 0;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* No-text (single media) mode should also keep full grid height */
.work-card .work-grid.no-text .media-column{
  height: 100%;
  min-height: 0;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}


/* =========================
   SCROLL CONTAINMENT FIX
   Prevent large work-text from expanding card; keep scroll inside work-text-inner
========================= */

.work-card .work-grid,
.work-card .work-text,
.work-card .media-column{
  min-height: 0; /* allow children to overflow/scroll instead of expanding */
}

.work-card .work-text{

  flex-direction:column;
  height: 100%;
}

.work-card .work-text .work-text-inner{
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
  max-height: 100%;
}

/* For no-media (text-only) cards: do NOT force vertical centering that breaks overflow;
   centering is handled elsewhere when text is short. */
.work-card .work-grid.no-media .work-text{
  justify-content: stretch;
}

/* For no-text cards keep media column stable */
.work-card .work-grid.no-text .media-column{
  justify-content: flex-start;
}


/* =========================

   Rows: header / grid / footer
   Fixes: work-grid too short + long text overflow
========================= */

.work-card{
  display:grid !important;

  align-content: stretch;

}

}

.work-card .work-grid{
  min-height:0 !important;
  height:auto !important;

}

/* Columns in the grid must be allowed to shrink for scroll to work */

.work-card .media-column{

}

/* Scroll lives ONLY here */

}

  overflow: auto !important;
}

.lightbox-media{
  width: var(--lb-media-w) !important;
  height: var(--lb-media-h) !important;
  max-width: none !important;
  max-height: none !important;
}

.lightbox-media img,
.lightbox-media video{
  width: 100% !important;
  height: 100% !important;
  max-width: none !important;
  max-height: none !important;
  object-fit: contain !important;
}


/* === Work-grid no-text media-box height === */
.work-grid.no-text .media-box{
  height: 260px !important;
}


/* === Press release size matches footer === */
.press-release-under-media{
  font-size:14px !important;
}



/* === Lightbox HEAVY blur + slower fade === */
.lightbox-overlay{
  transition: opacity 520ms ease, filter 520ms ease, transform 520ms ease !important;
  filter: blur(38px);
  transform: scale(1.02);
  will-change: opacity, filter, transform;
}

.lightbox-overlay.active{
  filter: blur(0px);
  transform: scale(1);
}


/* Optional: keep the media crisp during transition by blurring the overlay rather than the image itself.
   If you still see the image blurring too much, we can move blur to a background layer instead. */


/* === Remove blue focus outline from media-box after lightbox close === */
.media-box:focus{ outline:none !important; }
.media-box:focus-visible{ outline:none !important; }


/* Info ghost mode (white on white when not active) */
.info-card.info-ghost{
  background:#ffffff !important;
  color:#ffffff !important;
}
.info-card.info-ghost *{
  color:#ffffff !important;
  border-color:#ffffff !important;
}


/* Force remove card background */
.card,
.card.work-card,
.card.info-card,
.card.biography-card{
  background: transparent !important;
}


/* === Info card: slow fade-in on initial load (targets actual .card.info-card) === */
.card.info-card{
  opacity: 0;
  animation: infoCardFadeIn 1800ms ease forwards;
}

@keyframes infoCardFadeIn{
  from { opacity: 0; }
  to   { opacity: 1; }
}


/* === White scroll fades (override only, keep original geometry) === */
:root{
  --fade-rgb: 255,255,255;
}

/* Bottom fade overlay (keep existing positioning; just recolour) */
.work-text .scroll-fade{
  background: linear-gradient(
    to bottom,
    rgba(var(--fade-rgb),0),
    rgba(var(--fade-rgb),1)
  ) !important;
}

/* Top fade overlay (pseudo element) */
.work-text::before{
  background: linear-gradient(
    to bottom,
    rgba(var(--fade-rgb),1) 0%,
    rgba(var(--fade-rgb),0) 100%
  ) !important;
}


/* === Card transitions (smooth, no flash) === */
.card.card-exit{
  opacity: 0 !important;
  transition: opacity 320ms ease !important;
}

@keyframes cardFadeIn{
  from { opacity: 0; }
  to   { opacity: 1; }
}

.card.card-enter{
  opacity: 0;
  animation: cardFadeIn 420ms ease forwards;
  will-change: opacity;
}

/* While transitioning, keep any newly-visible card hidden until we attach .card-enter */
body.card-transitioning .card.work-card.visible{
  opacity: 0 !important;
}


/* === Artwork meta italic (forced) === */
.card .artwork-meta,
.artwork-meta{
  font-style: italic !important;
}


/* === Floating SVG sigil === */
#float-sigil{
  position: fixed;
  left: 0;
  top: 0;
  width: 162px;   /* 50% larger again */
  height: 162px;
  z-index: 9999;
  pointer-events: none; /* don't block clicks */
  user-select: none;
  transform: translate3d(0,0,0);
  will-change: transform;
  opacity: 0.95;
}
#float-sigil svg{
  width: 100%;
  height: 100%;
  display: block;
}

<script>


/* === Robust Year Formatter (TOP) === */
function formatYear(val){
  if(val === undefined || val === null || val === "") return "";
  const num = Number(val);
  if(Number.isFinite(num)) return String(Math.round(num));
  return String(val);
}

/* === Clean Excel ".0" artifacts (TOP) === */
function cleanDecimalArtifacts(str){
  if(str === undefined || str === null) return "";
  return String(str).replace(/\b(-?\d+)\.0\b/g, "$1");
}

/* Ensure globals even if scope changes */
window.formatYear = formatYear;
window.cleanDecimalArtifacts = cleanDecimalArtifacts;

const WORKS_DATA = (() => {
  const req = new XMLHttpRequest();
  req.open("GET", "./portfolio_database.json", false);
  req.send(null);
  if (req.status >= 200 && req.status < 300) {
    return JSON.parse(req.responseText);
  }
  throw new Error("Could not load ./portfolio_database.json");
})();

function shortCat(cat){
  const c = String(cat||"").trim();
  // Normalise common spreadsheet values (singular/plural)
  if(/^solo exhibition(s)?$/i.test(c)) return "Solo";
  if(/^group exhibition(s)?$/i.test(c)) return "Group";
  if(/^artist-?curation$/i.test(c)) return "Artist-Curation";
  if(/^artwork$/i.test(c)) return "Artwork";
  if(/^biography$/i.test(c)) return "Biography";
  if(/^info$/i.test(c)) return "Info";
  // Fallback: capitalise first letter, and remove trailing "Exhibition(s)"
  const cleaned = c.replace(/\s*exhibition(s)?$/i, "").trim();
  if(!cleaned) return "Work";
  return cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function renderInfoSelectedWorks(container){
  if(!container) return;

  const selected = WORKS_DATA.filter(w=>{
    const sel = String(w.selected_on_info||"").trim().toLowerCase()==="yes";
    const vis = String(w.site_visible||"yes").trim().toLowerCase()!=="no";
    return sel && vis;
  });

  const groupsOrder = ["Artwork","Artist-Curation","Solo Exhibition","Group Exhibition"];


  const groups = {};
  selected.forEach(w=>{
    const g = (w.subcategory||w.category_group||"").trim() || "Other";
    (groups[g] ||= []).push(w);
  });

  function labelFor(w){
    return (w.display_title || w.title || w.slug || "").trim();
  }

  function sortItems(items){
    if(!Array.isArray(items)) return;
    items.sort((a,b)=>{
      const oA = (a.info_sort_override===0 || a.info_sort_override) ? Number(a.info_sort_override) : null;
      const oB = (b.info_sort_override===0 || b.info_sort_override) ? Number(b.info_sort_override) : null;
      const hasA = oA !== null && !Number.isNaN(oA);
      const hasB = oB !== null && !Number.isNaN(oB);

      if(hasA || hasB){
        if(hasA && hasB && oA !== oB) return oA - oB;   // 1,2,3...
        if(hasA && !hasB) return -1;
        if(!hasA && hasB) return 1;
      }

      const yA = Number(a.sort_year || 0);
      const yB = Number(b.sort_year || 0);
      if(yB !== yA) return yB - yA;                     // newest first

      const tA = labelFor(a).toLowerCase();
      const tB = labelFor(b).toLowerCase();
      return tA.localeCompare(tB);
    });
  }

  // Header
  let out = '<div class="section-title">SELECTED WORKS</div>';

  groupsOrder.forEach(g=>{
    const items = groups[g];
    if(!items || !items.length) return;
    sortItems(items);
    out += '<div class="subhead">'+escapeHtml(g)+':</div><ul class="list">';
    items.forEach(w=>{
      out += '<li><button type="button" class="work-link" data-open-work="'+escapeHtml(w.slug)+'">'+escapeHtml(labelFor(w))+'</button></li>';
    });
    out += '</ul>';
  });

  // Any remaining groups
  Object.keys(groups).sort().forEach(g=>{
    if(groupsOrder.includes(g)) return;
    const items = groups[g];
    if(!items || !items.length) return;
    sortItems(items);
    out += '<div class="subhead">'+escapeHtml(g)+':</div><ul class="list">';
    items.forEach(w=>{
      out += '<li><button type="button" class="work-link" data-open-work="'+escapeHtml(w.slug)+'">'+escapeHtml(labelFor(w))+'</button></li>';
    });
    out += '</ul>';
  });

  container.innerHTML = out;
}



function buildMeta(w){
  const parts = [];
  if(w.curated_by) parts.push("Curated by " + w.curated_by);
  if(w.location) parts.push(cleanDecimalArtifacts(w.location));
  if(w.year !== undefined && w.year !== null && String(w.year).trim() !== "") parts.push(formatYear(w.year));
  // Clean any lingering Excel artifacts in the full line
  return cleanDecimalArtifacts(parts.join(", "));
}

function parseLinksOptionA(raw){
  const out=[];
  if(!raw) return out;
  raw.split("|").map(s=>s.trim()).filter(Boolean).forEach(part=>{
    if(part.includes("—")){
      const idx = part.indexOf("—");
      const label = part.slice(0, idx).trim();
      const url = part.slice(idx+1).trim();
      if(label) out.push({label, url: url || ""});
    }else{
      const label = part.trim();
      if(label) out.push({label, url:""});
    }
  });
  return out;
}

function renderLinksComma(raw){
  const links = parseLinksOptionA(raw);

  // Deduplicate by label+url (case-insensitive), preserving order
  const seen = new Set();
  const uniq = [];
  for(const l of links){
    const label = (l.label || "").trim();
    const url = (l.url || "").trim();
    const key = (label.toLowerCase() + "||" + url.toLowerCase());
    if(seen.has(key)) continue;
    seen.add(key);
    uniq.push({label, url});
  }

  if(!uniq.length) return "—";
  return uniq.map(l=>{
    if(l.url){
      return '<a href="'+l.url+'" target="_blank" rel="noopener">'+escapeHtml(l.label)+'</a>';
    }
    return '<span>'+escapeHtml(l.label)+'</span>';
  }).join(", ");
}

function updateWorkTextFade(workTextEl){
  const inner = workTextEl.querySelector(".work-text-inner");
  if(!inner) return;

  // Determine overflow
  const hasOverflow = inner.scrollHeight > inner.clientHeight + 1;
  workTextEl.classList.toggle("has-overflow", hasOverflow);

  // Determine if at bottom (within 1px)
  const atBottom = (inner.scrollTop + inner.clientHeight) >= (inner.scrollHeight - 1);
  workTextEl.classList.toggle("at-bottom", atBottom);

  // If no overflow, ensure fade hidden
  if(!hasOverflow) workTextEl.classList.add("at-bottom");
}

function bindWorkTextFade(cardEl){
  const workTextEl = cardEl.querySelector(".work-text");
  const inner = workTextEl ? workTextEl.querySelector(".work-text-inner") : null;
  if(!workTextEl || !inner) return;

  // Initial + on resize (measure after layout is ready)
  const run = ()=>updateWorkTextFade(workTextEl);
  run();
  requestAnimationFrame(run);
  setTimeout(run, 60);
  setTimeout(run, 160);
inner.addEventListener("scroll", run, {passive:true});
  window.addEventListener("resize", run);
}
function createWorkCard(w){
  const card = document.createElement("div");
  card.className = "card work-card";
  card.dataset.workSlug = w.slug || "";

  const hasText = !!(w.text && String(w.text).trim());
  const noMedia = (String(w.cover_image || "").trim().toUpperCase() === "NO");
  const layoutMode = String(w.layout_mode||"").toLowerCase();
  const slugLower = String(w.slug||"").toLowerCase();
  
  // --- Footer links builder (mapped to current spreadsheet) ---
  function buildLinksRaw(){
    // Prefer links_optionA (pipe-delimited: Label — URL|Label — URL)
    const opt = (w.links_optiona || "").toString().trim();
    if(opt) return opt;

    // Fallback to link_label_n / link_url_n columns
    const parts = [];
    for(let i=1;i<=6;i++){
      const label = (w["link_label_"+i] || "").toString().trim();
      const url   = (w["link_url_"+i]   || "").toString().trim();
      if(label && url) parts.push(label + " — " + url);
      else if(label) parts.push(label); // allow label-only
    }
    return parts.join("|");
  }
// --- Meta builders (mapped to current spreadsheet) ---
  // Works sheet headers: meta_display_override, curated_by, location, year_display, year_range_display_clean/year_range_display
  const metaOverride = (w.meta_display_override || "").trim();

  function buildWorkMetaLine(){
    if(metaOverride) return metaOverride;

    const parts = [];

    const curated = (w.curated_by || "").trim();
    const loc = (w.location || "").trim();

    // Prefer clean range display if provided, else year_display, else year_range_display
    const yr = (w.year_range_display_clean ?? w.year_display ?? w.year_range_display ?? "").toString().trim();
    const yrClean = cleanDecimalArtifacts(yr);

    if(curated) parts.push("Curated by " + curated);
    if(loc) parts.push(loc);
    if(yrClean) parts.push(yrClean);

    return parts.join(", ");
  }

  const workMetaText = buildWorkMetaLine();

  // Artwork meta from headers: Artwork title, Artwork materials, Dimensions (normalized -> artwork_title, artwork_materials, dimensions)
  function buildArtworkMetaLine(){
    const parts = [];
    const m = (w.artwork_materials || "").toString().trim();
    const d = (w.dimensions || "").toString().trim();

    if(m) parts.push(m);
    if(d) parts.push(d);

    return parts.join(", ");
  }

  const artworkMetaText = buildArtworkMetaLine();

  const workMetaHtml = workMetaText
    ? '<div class="work-meta">' + escapeHtml(cleanDecimalArtifacts(workMetaText)) + '</div>'
    : '<div class="work-meta"></div>';

  const artworkMetaHtml = artworkMetaText
    ? '<div class="artwork-meta">' + escapeHtml(cleanDecimalArtifacts(artworkMetaText)) + '</div>'
    : '<div class="artwork-meta"></div>';

  const displaySlugLower = String(w.display_slug||"").trim().toLowerCase();

  // Biography: support both explicit layout_mode and legacy detection (slug/display_slug)
  const isBio = (layoutMode === "bio_isolated") || (slugLower === "biography") || (displaySlugLower === "biography");

  // Artwork text-only: explicit mode only (set via spreadsheet), but we also accept legacy cover_image === "NO" for artwork category
  const isArtworkTextOnly = (layoutMode === "artwork_text_only") || ((String(w.subcategory||"").trim().toLowerCase()==="artwork") && (String(w.cover_image||"").trim().toUpperCase()==="NO"));

  // Card mode classes (kept for styling/debug)
  card.classList.add(hasText ? "has-text" : "no-text");
  if(noMedia) card.classList.add("no-media");

  
  if(isBio){ card.classList.add("is-biography"); card.classList.add("bio-isolated"); }
  if(isArtworkTextOnly){ card.classList.add("bio-isolated"); card.classList.add("artwork-text-only"); }
const leftMeta = [];
  
  const pressReleaseLink =
    (w.press_release_pdf && String(w.press_release_pdf).trim())
      ? '<div class="press-release-under-media"><a href="' + String(w.press_release_pdf).trim() + '" target="_blank" rel="noopener">Download Press Release</a></div>'
      : '';
if(w.materials) leftMeta.push(w.materials);
  if(w.dimensions) leftMeta.push(w.dimensions);

  // Media column (only when media exists)
  let mediaColumn = "";
  if(!noMedia){
    mediaColumn =
      '<div class="media-column">' +
        (w.artwork_title ? '<div class="artwork-title">'+escapeHtml(w.artwork_title)+'</div>' : '') +
        '<div class="media-box" role="button" tabindex="0" aria-label="Open media"></div>' + artworkMetaHtml + pressReleaseLink +
      '</div>';
  }

  const isInfo = (String(w.category || "").trim().toLowerCase() === "info");
  const footerHtml = isInfo ? '' : ('<div class="work-footer">For more information, see '+renderLinksComma(buildLinksRaw())+'</div>');

  const catForSlug = (w.subcategory || w.category_group || w.category || "").toString().trim();
  const slugTitle = (w.display_title || w.work_title || w.title || "").toString().trim();
  const slugDisplay = (w.display_slug && String(w.display_slug).trim())
    ? ('/ ' + String(w.display_slug).trim())
    : ('/ ' + shortCat(catForSlug) + ': ' + (slugTitle || ''));
// Work meta (curated by etc)
  const metaHtml = workMetaHtml;

  // Work grid classes (this is what CSS targets)
  let gridClass = "work-grid";
  const isNoTextGrid = gridClass.indexOf("no-text") !== -1;
  if(isNoTextGrid) card.classList.add("no-text");
  else card.classList.remove("no-text");

  if(noMedia) gridClass += " no-media";
  if(!hasText) gridClass += " no-text";
  if(hasText) gridClass += " has-text";

  // Text column (only when text exists)
  let textColumn = "";
if(hasText && !isBio){
    textColumn =
      '<div class="work-text">' +        '<div class="work-text-inner">'+(w.text || '')+'</div>' +
        '<div class="scroll-fade" aria-hidden="true"></div>' +
      '</div>';
  }

  // Compose grid in order: text (if any) then media (if any)
  const bioIsoHtml = (isBio || isArtworkTextOnly) ? (
  '<div class="bio-iso">' +
    '<div class="bio-iso-box">' +
      '<div class="bio-iso-viewport">' +
        '<div class="bio-fade bio-fade-top" aria-hidden="true"></div>' +
        '<div class="bio-iso-scroll">'+(w.text || '')+'</div>' +
        '<div class="bio-fade bio-fade-bottom" aria-hidden="true"></div>' +
      '</div>' +
    '</div>' +
  '</div>'
) : '';

card.innerHTML =
  '<div class="work-slug">'+escapeHtml(slugDisplay)+'</div>' +
  metaHtml +
  bioIsoHtml +
  '<div class="'+gridClass+'">' +
    textColumn +
    mediaColumn +
  '</div>' +
  footerHtml;

  // Apply cover image to media-box + store gallery for lightbox
  const mb = card.querySelector('.media-box');
  if(mb && !noMedia){
    const cover = String(w.cover_image || "").trim();
    if(cover && cover.toUpperCase() !== "NO"){
      mb.style.backgroundImage = 'url("' + cover + '")';
      mb.style.backgroundSize = 'cover';
      mb.style.backgroundPosition = 'center';
      mb.style.backgroundRepeat = 'no-repeat';
    }
    mb.dataset.workSlug = w.slug || '';
    mb.dataset.gallery = (w.gallery_images || '').trim();
  }

  // Scroll fades only when a scrollable text column exists
  if(hasText && !isBio){
    bindWorkTextFade(card);
  }

  return card;
}

const stage = document.getElementById("stage");

/* === Simple card stack controller === */
let Z_TOP = 2;
const CARD_BY_SLUG = new Map();


const globalHeader = document.getElementById("globalHeader");
function setGlobalHeaderVisible(on){
  if(!globalHeader) return;
  globalHeader.classList.toggle("visible", !!on);
}


const sidebarNav = document.getElementById("sidebarNav");
function setSidebarVisible(on){
  if(!sidebarNav) return;
  sidebarNav.classList.toggle("visible", !!on);
  document.body.classList.toggle("sidebar-on", !!on);
}

function renderSidebarWorks(container){
  if(!container) return;

  const researchItem = WORKS_DATA.find(w => String(w.slug||"").trim().toLowerCase() === "research");
  const researchVisible = !!(researchItem && String(researchItem.site_visible||"yes").trim().toLowerCase() === "yes");
  const researchTopBtn = document.getElementById("sidebarResearchTop");
  if(researchTopBtn){
    researchTopBtn.style.display = researchVisible ? "" : "none"; researchTopBtn.style.fontStyle = "normal"; researchTopBtn.style.setProperty("font-style","normal","important"); researchTopBtn.style.fontStyle = "normal"; researchTopBtn.style.setProperty("font-style","normal","important");
  }

  const visible = WORKS_DATA.filter(w=>{
    const slug = String(w.slug||"").trim().toLowerCase();
    const isInfoCategory = String(w.category||"").trim().toLowerCase() === "info";
    const vis = String(w.site_visible||"yes").trim().toLowerCase() === "yes";
    const excludeManualTopLinks = slug === "biography" || slug === "research";
    return !isInfoCategory && vis && w.slug && !excludeManualTopLinks;
  });

  const groupsOrder = ["Artwork","Artist-Curation","Solo Exhibition","Group Exhibition"];
  const groups = {};
  visible.forEach(w=>{
    const g = (w.subcategory||w.category_group||"").trim() || "Other";
    (groups[g] ||= []).push(w);
  });

  function labelFor(w){
    return (w.display_title || w.title || w.slug || "").trim();
  }

  function sortItems(items){
    if(!Array.isArray(items)) return;
    items.sort((a,b)=>{
      const oA = (a.info_sort_override===0 || a.info_sort_override) ? Number(a.info_sort_override) : null;
      const oB = (b.info_sort_override===0 || b.info_sort_override) ? Number(b.info_sort_override) : null;
      const hasA = oA !== null && !Number.isNaN(oA);
      const hasB = oB !== null && !Number.isNaN(oB);

      if(hasA || hasB){
        if(hasA && hasB && oA !== oB) return oA - oB;
        if(hasA && !hasB) return -1;
        if(!hasA && hasB) return 1;
      }

      const yA = Number(a.sort_year || 0);
      const yB = Number(b.sort_year || 0);
      if(yB !== yA) return yB - yA;

      const tA = labelFor(a).toLowerCase();
      const tB = labelFor(b).toLowerCase();
      return tA.localeCompare(tB);
    });
  }

  let out = "";

  groupsOrder.forEach(g=>{
    const items = groups[g];
    if(!items || !items.length) return;
    sortItems(items);
    out += '<div class="sidebar-subhead">'+escapeHtml(g)+'</div><ul class="sidebar-list">';
    items.forEach(w=>{
      out += '<li><button type="button" class="sidebar-link" data-open-work="'+escapeHtml(w.slug)+'">'+escapeHtml(labelFor(w))+'</button></li>';
    });
    out += '</ul>';
  });

  Object.keys(groups).sort().forEach(g=>{
    if(groupsOrder.includes(g)) return;
    const items = groups[g];
    if(!items || !items.length) return;
    sortItems(items);
    out += '<div class="sidebar-subhead">'+escapeHtml(g)+'</div><ul class="sidebar-list">';
    items.forEach(w=>{
      out += '<li><button type="button" class="sidebar-link" data-open-work="'+escapeHtml(w.slug)+'">'+escapeHtml(labelFor(w))+'</button></li>';
    });
    out += '</ul>';
  });

  container.innerHTML = out;
}

  const navBtn = e.target.closest && e.target.closest('[data-nav="info"]');
  if(!navBtn) return;
  e.preventDefault();
  goHome();

function goHome(){
  const info = document.querySelector(".card.info-card");
  if(!info) return;

  document.querySelectorAll(".card").forEach(function(c){
    if(c !== info){
      c.classList.remove("visible");
      c.classList.add("hidden");
      c.style.display = "none";
      c.style.visibility = "hidden";
    }
  });

  showCard(info);
}

if(globalHeader){
  globalHeader.addEventListener("click", goHome);
  globalHeader.addEventListener("keydown", function(e){
    if(e.key === "Enter" || e.key === " "){
      e.preventDefault();
      goHome();
    }
  });
}


function showCard(card){
  if(!card) return;
  card.classList.remove("hidden");
  card.classList.add("visible");
  card.style.display = "block";
  if(card.classList && card.classList.contains("mobile-pre-enter")){
    card.style.visibility = "hidden";
    card.style.opacity = "0";
  } else {
    card.style.visibility = "visible";
    card.style.opacity = "";
  }
  card.style.zIndex = String(++Z_TOP);
  const wt = card.querySelector && card.querySelector('.work-text');
  if(wt){ requestAnimationFrame(()=>updateWorkTextFade(wt)); setTimeout(()=>updateWorkTextFade(wt), 80); }
  const isInfo = card.classList && card.classList.contains('info-card');
  setGlobalHeaderVisible(!isInfo);
  setSidebarVisible(!isInfo);
}

/* === Top Fade Scroll Logic === */
document.addEventListener("DOMContentLoaded", function () {
  document.querySelectorAll(".work-text .work-text-inner").forEach(function(inner){
    const container = inner.closest(".work-text");

    function updateFade(){
      if(inner.scrollTop > 2){
        container.classList.add("has-top-fade");
      } else {
        container.classList.remove("has-top-fade");
      }
    }

    inner.addEventListener("scroll", updateFade);
    updateFade();
  });
});

<script>
/* === Lightbox Behaviour (rebuild) === */
(function(){
  const overlay = document.createElement("div");
  overlay.className = "lightbox-overlay";
  overlay.setAttribute("role","dialog");
  overlay.setAttribute("aria-modal","true");
  overlay.setAttribute("aria-hidden","true");
  overlay.setAttribute("inert","");
  overlay.style.display = "none";

  const inner = document.createElement("div");
  inner.className = "lightbox-inner";

  const closeBtn = document.createElement("button");
  closeBtn.className = "lightbox-close";
  closeBtn.type = "button";
  closeBtn.setAttribute("aria-label","Close lightbox");
  closeBtn.textContent = "Close";

  const slugEl = document.createElement("div");
  slugEl.className = "lightbox-slug";

  const media = document.createElement("div");
  media.className = "lightbox-media";
  media.setAttribute("aria-label","Media area");

  const track = document.createElement("div");
  track.className = "lightbox-track";
  media.appendChild(track);

  const footerEl = document.createElement("div");
  footerEl.className = "lightbox-footer";

  inner.appendChild(slugEl);
  inner.appendChild(closeBtn);
  inner.appendChild(media);
  inner.appendChild(footerEl);
  overlay.appendChild(inner);
  document.body.appendChild(overlay);

  const __lightboxPreloadCache = new Set();

  function preloadImages(images){
    (images || []).forEach((src)=>{
      const url = String(src || "").trim();
      if(!url || __lightboxPreloadCache.has(url)) return;
      const img = new Image();
      img.decoding = "async";
      img.src = url;
      __lightboxPreloadCache.add(url);
    });
  }

  function buildSlides(images){
    track.innerHTML = "";
    const list = (images || []).map(src => String(src || "").trim()).filter(Boolean);

    // Kick off preloading immediately so swiping feels instant.
    preloadImages(list);

    list.forEach((src, index)=>{
      const slide = document.createElement("div");
      slide.className = "lightbox-slide";

      const img = document.createElement("img");
      img.alt = "";
      img.loading = index < 2 ? "eager" : "lazy";
      img.decoding = "async";
      img.src = src;

      slide.appendChild(img);
      track.appendChild(slide);
    });

    // Hard reset to the first image every time the lightbox is opened.
    track.scrollLeft = 0;
    const firstSlide = track.querySelector(".lightbox-slide");
    if(firstSlide){
      requestAnimationFrame(()=>{ firstSlide.scrollIntoView({behavior:"auto", inline:"center", block:"nearest"}); });
      setTimeout(()=>{ firstSlide.scrollIntoView({behavior:"auto", inline:"center", block:"nearest"}); }, 40);
      setTimeout(()=>{ firstSlide.scrollIntoView({behavior:"auto", inline:"center", block:"nearest"}); }, 140);
    }
  }

  function setFooter(workObj){
    let footerHTML = "";
    if(workObj){
      const name = String(workObj.photographed_by||"").trim();
      const url = String(workObj.photographed_by_url||"").trim();
      if(name && name.includes("—") && !url){
        const parts = name.split("—");
        const n = (parts[0]||"").trim();
        const u = (parts[1]||"").trim();
        footerHTML = u ? ('Photography: <a href="' + u + '" target="_blank" rel="noopener">' + n + '</a>') : ('Photography: ' + n);
      } else if(name && url){
        footerHTML = 'Photography: <a href="' + url + '" target="_blank" rel="noopener">' + name + '</a>';
      } else if(name){
        footerHTML = "Photography: "+name;
      }
    }
    footerEl.innerHTML = footerHTML;
  }

  function openForMediaBox(box){
    if(!box) return;
    const slug = (box.dataset && box.dataset.workSlug) ? box.dataset.workSlug : "";
    const gallery = (box.dataset && box.dataset.gallery) ? String(box.dataset.gallery).trim() : "";
    const workObj = (typeof WORKS_DATA !== "undefined") ? WORKS_DATA.find(w => String(w.slug||"") === String(slug)) : null;

    const slugText = (()=>{
      if(!workObj) return "";
      const disp = (workObj.display_slug && String(workObj.display_slug).trim())
        ? ("/ "+String(workObj.display_slug).trim())
        : ("/ "+shortCat((workObj.subcategory||workObj.category_group||"Work"))+": "+(workObj.display_title||workObj.work_title||workObj.title||""));
      return disp;
    })();
    slugEl.textContent = slugText;

    let images = [];
    if(gallery){
      images = gallery.split(",").map(s=>s.trim()).filter(Boolean);
    } else if(workObj && workObj.cover_image && String(workObj.cover_image).trim().toUpperCase() !== "NO"){
      images = [String(workObj.cover_image).trim()];
    }
    buildSlides(images);
    setFooter(workObj);

    overlay.style.display = "flex";
    overlay.removeAttribute("inert");
    overlay.setAttribute("aria-hidden","false");
    requestAnimationFrame(()=>{
      overlay.classList.add("active");
      const firstSlide = track.querySelector(".lightbox-slide");
      if(firstSlide){
        firstSlide.scrollIntoView({behavior:"auto", inline:"center", block:"nearest"});
      }else{
        track.scrollLeft = 0;
      }
      try{ closeBtn.focus({preventScroll:true}); }catch(e){ try{ closeBtn.focus(); }catch(_e){} }
    });
  }

  function close(){
    const active = document.activeElement;
    if(active && overlay.contains(active) && typeof active.blur === "function"){
      active.blur();
    }

    // Start the visual fade/blur-out first.
    overlay.classList.remove("active");
    overlay.setAttribute("aria-hidden","true");
    overlay.setAttribute("inert","");
    overlay.style.pointerEvents = "none";

    const finishClose = ()=>{
      if(overlay.classList.contains("active")) return;

      overlay.style.display = "none";
      overlay.style.pointerEvents = "none";
      document.body.classList.remove("mobile-lightbox-open");

      const menuBtn = document.getElementById("mobileNavToggle");
      if(menuBtn && window.matchMedia("(max-width: 900px)").matches){
        menuBtn.style.display = "block";
        menuBtn.style.opacity = "1";
        menuBtn.style.visibility = "visible";
        menuBtn.style.pointerEvents = "auto";
      }

      document.querySelectorAll(".media-box").forEach((box)=>{
        box.style.pointerEvents = "auto";
      });
    };

    // Match the 520ms overlay blur/fade transition, with a little buffer.
    setTimeout(finishClose, 560);
  }

  // Click / tap open
  document.addEventListener("click", (e)=>{
    const box = e.target.closest && e.target.closest(".media-box");
    if(!box) return;
    e.preventDefault();
    openForMediaBox(box);
  });

  // Keyboard open
  document.addEventListener("keydown", (e)=>{
    if((e.key === "Enter" || e.key === " ") && document.activeElement && document.activeElement.classList && document.activeElement.classList.contains("media-box")) {
      e.preventDefault();
      openForMediaBox(document.activeElement);
      return;
    }
    if(e.key === "Escape") close();
  });

  closeBtn.addEventListener("click", close);
  overlay.addEventListener("click", (e)=>{
    if(e.target === overlay) close();
  });
})();

<script>
/* === Toggle scrollable class for text+media cards (runs after show) === */
(function(){
  function update(card){
    const grid = card.querySelector(".work-grid");
    if(!grid || !grid.classList.contains("has-text")) return;
    if(grid.classList.contains("no-media")) return;

    const wt = card.querySelector(".work-text");
    const inner = card.querySelector(".work-text-inner");
    if(!wt || !inner) return;

    // Must be visible to measure correctly
    if(getComputedStyle(card).display === "none") return;

    // Temporarily set overflow hidden for measurement consistency
    const prev = inner.style.overflow;
    inner.style.overflow = "hidden";
    const scrollable = inner.scrollHeight > inner.clientHeight + 2;
    inner.style.overflow = prev;

    wt.classList.toggle("scrollable", scrollable);
  }

  function scan(){
    document.querySelectorAll(".card.work-card").forEach(update);
  }

  window.addEventListener("load", ()=>setTimeout(scan,0));
  window.addEventListener("resize", ()=>setTimeout(scan,0));

  // After any navigation opens a card
  document.addEventListener("click", (e)=>{
    if(e.target.closest && e.target.closest("[data-open-work], [data-nav], #openBiography")){
      setTimeout(scan, 80);
    }
  });

  // If showCard exists, hook it without rewriting it
  const _show = window.showCard;
  if(typeof _show === "function"){
    window.showCard = function(card){
      _show(card);
      setTimeout(scan, 80);
    };
  }
})();
</script>

<script>
/* === Biography fades controller === */
(function(){
  function bindBio(card){
    if(!card.classList.contains("is-biography")) return;
    const inner = card.querySelector(".bio-text .work-text-inner");
    const topFade = card.querySelector(".bio-fade-top");
    const botFade = card.querySelector(".bio-fade-bottom");
    if(!inner || !topFade || !botFade) return;

    function update(){
      const maxScroll = inner.scrollHeight - inner.clientHeight;
      const y = inner.scrollTop;
      topFade.classList.toggle("show", y > 2);
      botFade.classList.toggle("show", y < maxScroll - 2);
    }
    inner.addEventListener("scroll", update, {passive:true});
    // initial
    requestAnimationFrame(update);
    // also on resize
    window.addEventListener("resize", ()=>requestAnimationFrame(update));
  }

  function scan(){
    document.querySelectorAll(".card.work-card.is-biography").forEach(bindBio);
  }

  window.addEventListener("load", ()=>setTimeout(scan,0));
  document.addEventListener("click", (e)=>{
    if(e.target.closest && e.target.closest("[data-open-work], [data-nav], #openBiography")){
      setTimeout(scan, 80);
    }
  });
})();
</script>

<script>
/* === Biography isolated sizing + fades === */
(function(){
  function bindBioIso(card){
    if(!card.classList.contains("bio-isolated")) return;
    const box = card.querySelector(".bio-iso-box");
    const viewport = card.querySelector(".bio-iso-viewport");
    const sc = card.querySelector(".bio-iso-scroll");
    const topFade = card.querySelector(".bio-fade-top");
    const botFade = card.querySelector(".bio-fade-bottom");
    if(!box || !viewport || !sc || !topFade || !botFade) return;

    function fit(){
      // available vertical space inside card between meta and footer
      const cardRect = card.getBoundingClientRect();
      const footer = card.querySelector(".work-footer");
      const meta = card.querySelector(".work-meta");
      const metaRect = meta ? meta.getBoundingClientRect() : cardRect;
      const footerTop = footer ? footer.getBoundingClientRect().top : (cardRect.bottom - 30);
      const pad = 12; // breathing room
      const avail = Math.max(120, footerTop - metaRect.bottom - pad*2);
      sc.style.maxHeight = Math.floor(avail) + "px";
      // ensure viewport height matches the scroll viewport
      viewport.style.height = sc.getBoundingClientRect().height + "px";
      update();
    }

    function update(){
      const maxScroll = sc.scrollHeight - sc.clientHeight;
      const y = sc.scrollTop;
      topFade.classList.toggle("show", y > 2);
      botFade.classList.toggle("show", y < maxScroll - 2);
    }

    sc.addEventListener("scroll", update, {passive:true});
    window.addEventListener("resize", ()=>requestAnimationFrame(fit));
    requestAnimationFrame(fit);
  }

  function scan(){
    document.querySelectorAll(".card.work-card").forEach(bindBioIso);
  }
  window.addEventListener("load", ()=>setTimeout(scan,0));
  document.addEventListener("click", (e)=>{
    if(e.target.closest && e.target.closest("[data-open-work], [data-nav], #openBiography")){
      setTimeout(scan, 80);
    }
  });
})();

/* === Sidebar Active Highlight Logic (workSlug-aware) === */
(function(){

  function topMostVisibleWorkCard(){
    const cards = Array.from(document.querySelectorAll(".card.work-card.visible"))
      .filter(c => (c.style.display !== "none") && (c.style.visibility !== "hidden"));
    if(!cards.length) return null;

    // pick highest z-index (string -> number)
    cards.sort((a,b)=>{
      const za = Number(a.style.zIndex || getComputedStyle(a).zIndex || 0);
      const zb = Number(b.style.zIndex || getComputedStyle(b).zIndex || 0);
      return zb - za;
    });
    return cards[0] || null;
  }

  function updateSidebarActive(){
    // Clear existing active states (works + top links)
    document.querySelectorAll(".sidebar-list li.active").forEach(li => li.classList.remove("active"));
    document.querySelectorAll("#sidebarNav .sidebar-link.active-link").forEach(el => el.classList.remove("active-link"));

    // Find the top-most visible work card
    const cards = Array.from(document.querySelectorAll(".card.work-card.visible"))
      .filter(c => c.style.display !== "none");
    if(!cards.length) return;

    cards.sort((a,b)=>{
      const za = Number(a.style.zIndex || getComputedStyle(a).zIndex || 0);
      const zb = Number(b.style.zIndex || getComputedStyle(b).zIndex || 0);
      return zb - za;
    });
    const card = cards[0];

    const slug = (card?.dataset?.workSlug || "").trim();
    if(!slug) return;

    // Top sidebar links use active-link instead of li.active
    if(slug.toLowerCase() === "biography" || slug.toLowerCase() === "research"){
      const topBtn = document.querySelector('#sidebarNav .sidebar-link[data-open-work="' + CSS.escape(slug) + '"]');
      if(topBtn) topBtn.classList.add("active-link");
      return;
    }

    // Otherwise highlight the corresponding work in the grouped list
    const link = document.querySelector('#sidebarNav .sidebar-link[data-open-work="' + CSS.escape(slug) + '"]');
    if(!link) return;
    const li = link.closest("li");
    if(li) li.classList.add("active");
  }

  // Hook into showCard (do not break original behavior)
  const originalShowCard = window.showCard;
  if(typeof originalShowCard === "function"){
    window.showCard = function(card){
      originalShowCard(card);
      // allow DOM updates/z-index to settle
      setTimeout(updateSidebarActive, 0);
      setTimeout(updateSidebarActive, 40);
    };
  }

  // Also update when opening via sidebar/info buttons (delegated click)
  document.addEventListener("click", function(e){
    const btn = e.target.closest && e.target.closest("[data-open-work], #openBiography, [data-nav='info']");
    if(btn) {
      setTimeout(updateSidebarActive, 0);
      setTimeout(updateSidebarActive, 60);
    }
  });

  window.addEventListener("load", function(){
    setTimeout(updateSidebarActive, 80);
  });

  // Re-sync highlight after viewport/layout changes (e.g. media view back to full window size)
  window.addEventListener("resize", function(){
    setTimeout(updateSidebarActive, 0);
    setTimeout(updateSidebarActive, 80);
    setTimeout(updateSidebarActive, 180);
  });

})();




/* === Sidebar Exact 20 Character Truncation === */
(function(){
  const MAX = 20;

  function truncateSidebarTitles(){
    const links = document.querySelectorAll("#sidebarNav .sidebar-list .sidebar-link");

    links.forEach(link=>{
      const full = link.getAttribute("data-full-title") || link.textContent.trim();

      // store original full title once
      if(!link.getAttribute("data-full-title")){
        link.setAttribute("data-full-title", full);
      }

      if(full.length > MAX){
        link.textContent = full.slice(0, MAX) + "…";
      }else{
        link.textContent = full;
      }
    });
  }

  window.addEventListener("load", ()=>{
    setTimeout(truncateSidebarTitles, 50);
  });

  // Re-run after sidebar rebuild (wrap existing builder if present)
  const originalShowCard = window.showCard;
  if(typeof originalShowCard === "function"){
    window.showCard = function(card){
      originalShowCard(card);
      setTimeout(truncateSidebarTitles, 50);
    };
  }

})();








/* === Sidebar Position (VERTICAL MATCHED + RULES): 
   - LEFT: Works use actual rect; Biography uses synthetic work-card rect (so it never follows biography geometry)
   - TOP: Both states use shared synthetic work-frame top (perfect vertical match)
   - Offscreen OK (no clamping) === */
(function(){
  const sidebar = document.getElementById("sidebarNav");
  if(!sidebar) return;

  const GAP = 20;
  const Y_OFFSET = 50;   // raised 10px micro-adjust   // lowered 40px for final alignment   // single vertical offset applied to BOTH states
  const CARD_W = 720;
  const CARD_H = 480;

  const sidebarWidth = ()=> (sidebar.offsetWidth || 240);

  function topMostVisibleWorkCard(){
    const cards = Array.from(document.querySelectorAll(".card.work-card.visible"))
      .filter(c => c.style.display !== "none");
    if(!cards.length) return null;
    cards.sort((a,b)=>{
      const za = Number(a.style.zIndex || getComputedStyle(a).zIndex || 0);
      const zb = Number(b.style.zIndex || getComputedStyle(b).zIndex || 0);
      return zb - za;
    });
    return cards[0];
  }

  function isBiography(card){
    const slug = card?.dataset?.workSlug || "";
    return slug.toLowerCase() === "biography";
  }

  function setCardShift(card, px){
    if(!card) return;
    card.style.setProperty("--card-x-shift", (px || 0) + "px");
  }

  function syntheticWorkRect(shiftPx){
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const oy = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--card-optical-y")) || 0;

    const left = ((vw - CARD_W) / 2) + shiftPx;
    const top  = ((vh - CARD_H) / 2) + oy;

    return { left, top, width: CARD_W, height: CARD_H };
  }

  function positionSidebarFrom(leftRect, workFrameTop, sbW){
    // LEFT derived from leftRect (work or synthetic) to preserve GAP
    const left = leftRect.left - sbW - GAP;
    // TOP derived from shared work-frame top so biography + works match perfectly
    const top  = workFrameTop + Y_OFFSET;

    sidebar.style.left = left + "px";
    sidebar.style.top  = top + "px";
  }

  function update(){
    if(!sidebar.classList.contains("visible")) return;

    const card = topMostVisibleWorkCard();
    if(!card) return;

    const sbW = sidebarWidth();

    // Keep card at native centered position (no clamp)
    const shift = 0;
    setCardShift(card, shift);

    requestAnimationFrame(()=>{
      const workFrame = syntheticWorkRect(shift); // shared top reference

      if(isBiography(card)){
        // Biography MUST follow work-card geometry for BOTH axes
        positionSidebarFrom(workFrame, workFrame.top, sbW);
      }else{
        // Works: left from actual card rect; top from shared work-frame top
        const actualRect = card.getBoundingClientRect();
        positionSidebarFrom(actualRect, workFrame.top, sbW);
      }
    });
  }

  const originalShowCard = window.showCard;
  if(typeof originalShowCard === "function"){
    window.showCard = function(card){
      originalShowCard(card);
      setTimeout(update, 0);
      setTimeout(update, 60);
    };
  }

  const originalSetSidebarVisible = window.setSidebarVisible;
  if(typeof originalSetSidebarVisible === "function"){
    window.setSidebarVisible = function(on){
      originalSetSidebarVisible(on);
      setTimeout(update, 0);
      setTimeout(update, 60);
    };
  }

  window.addEventListener("resize", ()=>setTimeout(update, 0));
  window.addEventListener("scroll", ()=>setTimeout(update, 0), {passive:true});
  window.addEventListener("load", ()=>setTimeout(update, 120));
})();

/* =====================================================
   LIGHTBOX KEYBOARD NAVIGATION (FULL SET)
   → / ←  : next/prev
   Space  : next
   ESC    : close
   Home   : first
   End    : last
===================================================== */
document.addEventListener("keydown", function(e){
  const overlay = document.querySelector(".lightbox-overlay.active");
  if(!overlay) return;

  const track = overlay.querySelector(".lightbox-track");
  if(!track) return;

  // Avoid hijacking typing in inputs (safety)
  const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : "";
  if(tag === "input" || tag === "textarea" || e.target.isContentEditable) return;

  const slideWidth = track.clientWidth || 0;
  if(!slideWidth) return;

  const maxScroll = Math.max(0, track.scrollWidth - slideWidth);

  // → NEXT (also Space)
  if(e.key === "ArrowRight" || e.key === " "){
    e.preventDefault();
    track.scrollBy({ left: slideWidth, behavior: "smooth" });
    return;
  }

  // ← PREVIOUS
  if(e.key === "ArrowLeft"){
    e.preventDefault();
    track.scrollBy({ left: -slideWidth, behavior: "smooth" });
    return;
  }

  // HOME → FIRST
  if(e.key === "Home"){
    e.preventDefault();
    track.scrollTo({ left: 0, behavior: "smooth" });
    return;
  }

  // END → LAST
  if(e.key === "End"){
    e.preventDefault();
    track.scrollTo({ left: maxScroll, behavior: "smooth" });
    return;
  }

  // ESC → CLOSE
  if(e.key === "Escape"){
    const closeBtn = overlay.querySelector(".lightbox-close");
    if(closeBtn){
      closeBtn.click();
    } else {
      // fallback: remove active class if close button not found
      overlay.classList.remove("active");
    }
  }
});

</script>

<script>
(function(){
  function closeAllCardsExcept(keep){
    const cards = Array.from(document.querySelectorAll(".card"));
    cards.forEach(c=>{
      if(c === keep) return;
      c.classList.remove("visible");
      c.classList.add("hidden");
      c.style.display = "none";
    });
  }

  function ensureVisible(card){

    card.classList.add("visible");

  }

  const originalShowCard = window.showCard;

    };
  }

<!-- === Fade between cards (smooth match to v4.4.22) === -->
<script>
(function(){
  function topMostVisibleCard(){
    const visibles = Array.from(document.querySelectorAll(".card.work-card.visible"))
      .filter(c => c && c.style.display !== "none");
    if(!visibles.length) return null;
    visibles.sort((a,b)=>{
      const za = Number(a.style.zIndex || getComputedStyle(a).zIndex || 0);
      const zb = Number(b.style.zIndex || getComputedStyle(b).zIndex || 0);
      return zb - za;
    });
    return visibles[0];
  }

  function animateIn(card){
    if(!card || !card.classList) return;
    card.classList.remove("card-enter");
    void card.offsetWidth;
    card.classList.add("card-enter");
    setTimeout(()=>{
      try{ card.classList.remove("card-enter"); }catch(e){}
      try{ card.classList.remove("mobile-pre-enter"); }catch(e){}
      try{ card.style.visibility = ""; }catch(e){}
    }, 520);
  }

  const originalShowCard = window.showCard;
  if(typeof originalShowCard !== "function") return;
  if(window.__CARD_TRANSITIONS_SMOOTH_INSTALLED) return;
  window.__CARD_TRANSITIONS_SMOOTH_INSTALLED = true;

  let inFlight = false;

  window.showCard = function(target){
    if(inFlight) return originalShowCard(target);

    const mobileSafariPrep = !!(
      target &&
      window.matchMedia &&
      window.matchMedia("(max-width: 900px)").matches &&
      document.body.classList.contains("mobile-nav-transitioning")
    );

    if(mobileSafariPrep && target.classList){
      target.classList.add("mobile-pre-enter");
    }

    const current = topMostVisibleCard();

    // If nothing is open yet, just open and animate in
    if(!current){
      const res0 = originalShowCard(target);
      requestAnimationFrame(()=>{
        const next0 = topMostVisibleCard();
        if(next0){
          animateIn(next0);
          requestAnimationFrame(()=>{
            requestAnimationFrame(()=>{
              next0.classList.remove("mobile-pre-enter");
              next0.style.visibility = "";
            });
          });
        }
      });
      return res0;
    }

    inFlight = true;
    current.classList.add("card-exit");

    const OUT_MS = 320;

    setTimeout(function(){
      try{ current.classList.remove("card-exit"); }catch(e){}

      // Gate visibility to prevent flash
      document.body.classList.add("card-transitioning");

      const res = originalShowCard(target);

      // Next frame: attach enter animation BEFORE un-gating
      requestAnimationFrame(function(){
        const next = topMostVisibleCard();
        if(next){
          // Ensure it starts hidden (still gated), then animate in
          animateIn(next);
          requestAnimationFrame(function(){
            requestAnimationFrame(function(){
              next.classList.remove("mobile-pre-enter");
              next.style.visibility = "";
            });
          });
        }

        const release = function(){
          document.body.classList.remove("card-transitioning");
          inFlight = false;
        };

        if(mobileSafariPrep){
          requestAnimationFrame(function(){
            requestAnimationFrame(function(){
              setTimeout(release, 80);
            });
          });
        } else {
          release();
        }
      });

      return res;
    }, OUT_MS);
  };
})();
</script>



<script>
(function(){
  const el = document.getElementById("float-sigil");
  if(!el) return;

  function rand(min, max){ return Math.random() * (max - min) + min; }
  function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }

  // Read size
  let w = el.offsetWidth  || 72;
  let h = el.offsetHeight || 72;

  // Random start
  let x = rand(16, Math.max(16, window.innerWidth  - w - 16));
  let y = rand(16, Math.max(16, window.innerHeight - h - 16));

  // Velocity px/s
  let vx = (Math.random() < 0.5 ? -1 : 1) * rand(70, 140);
  let vy = (Math.random() < 0.5 ? -1 : 1) * rand(70, 140);

  // Rotation physics
  let angle = rand(0, 360); // degrees
  let omega = (Math.random() < 0.5 ? -1 : 1) * rand(90, 220); // deg/s
  const spinDamp = 0.22; // per second

  // Cursor bumper
  let mouseX = -9999, mouseY = -9999;
  const cursorRadius = 44;
  const sigilRadius  = 81; // for 72px

  window.addEventListener("mousemove", (e)=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
  }, {passive:true});

  function updateSize(){
    w = el.offsetWidth  || 72;
    h = el.offsetHeight || 72;
  }
  window.addEventListener("resize", ()=>{
    updateSize();
    x = clamp(x, 0, Math.max(0, window.innerWidth - w));
    y = clamp(y, 0, Math.max(0, window.innerHeight - h));
  }, {passive:true});

  function kickSpin(impulse){
    omega = clamp(omega + impulse, -280, 280);
  }

  let last = performance.now();

  function step(now){
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    // Integrate position
    x += vx * dt;
    y += vy * dt;

    // Wall bounce
    const maxX = window.innerWidth  - w;
    const maxY = window.innerHeight - h;

    let hit = false;

    if(x <= 0){ x = 0; vx = Math.abs(vx); hit = true; kickSpin( +(Math.abs(vx)+Math.abs(vy))*0.04 ); }
    if(x >= maxX){ x = maxX; vx = -Math.abs(vx); hit = true; kickSpin( -(Math.abs(vx)+Math.abs(vy))*0.04 ); }
    if(y <= 0){ y = 0; vy = Math.abs(vy); hit = true; kickSpin( -(Math.abs(vx)+Math.abs(vy))*0.035 ); }
    if(y >= maxY){ y = maxY; vy = -Math.abs(vy); hit = true; kickSpin( +(Math.abs(vx)+Math.abs(vy))*0.035 ); }

    // Cursor bounce (circle)
    const cx = x + w/2;
    const cy = y + h/2;
    const dx = cx - mouseX;
    const dy = cy - mouseY;
    const dist = Math.hypot(dx, dy);
    const minDist = cursorRadius + sigilRadius;

    if(dist > 0 && dist < minDist){
      const nx = dx / dist;
      const ny = dy / dist;

      // Push out
      const push = (minDist - dist) + 0.5;
      x += nx * push;
      y += ny * push;

      // Reflect velocity about normal
      const dot = vx*nx + vy*ny;
      vx = vx - 2*dot*nx;
      vy = vy - 2*dot*ny;

      // Spin impulse from tangential component
      const tx = -ny, ty = nx;
      const tangential = (vx*tx + vy*ty);
      kickSpin(tangential * 0.06);

      // tiny jitter to avoid sticking
      vx += (Math.random()-0.5)*6;
      vy += (Math.random()-0.5)*6;
    }

    // Integrate rotation + damping
    angle += omega * dt;
    omega *= (1 - spinDamp * dt);

    // Apply
    el.style.transform = `translate3d(${x}px, ${y}px, 0) rotate(${angle}deg)`;

    requestAnimationFrame(step);
  }

  // Start
  el.style.transform = `translate3d(${x}px, ${y}px, 0) rotate(${angle}deg)`;
  requestAnimationFrame(step);
})();
</script>








<script>
(function(){
  const mq = window.matchMedia("(max-width: 900px)");
  const toggle = document.getElementById("mobileNavToggle");
  const overlay = document.getElementById("mobileNavOverlay");
  const content = document.getElementById("mobileNavContent");
  const closeBtn = overlay ? overlay.querySelector(".mobile-nav-close") : null;

  if(!toggle || !overlay || !content) return;

  const OVERLAY_FADE_MS = 220;
  const HOLD_AFTER_TRIGGER_MS = 260; // keep gate up long enough for the site's own fade-in to begin
  let handoffLock = false;

  function closeOverlay(){
    const active = document.activeElement;
    if(active && overlay.contains(active) && typeof active.blur === "function"){
      active.blur();
    }
    overlay.classList.remove("open", "handoff");
    overlay.setAttribute("aria-hidden", "true");
    overlay.setAttribute("inert", "");
    toggle.classList.remove("is-open");
    toggle.setAttribute("aria-expanded", "false");
    if(typeof toggle.focus === "function"){
      try{ toggle.focus({preventScroll:true}); }catch(e){ toggle.focus(); }
    }
  }

  function syncLightboxState(){
    if(!mq.matches){
      document.body.classList.remove("mobile-lightbox-open", "mobile-nav-transitioning");
      closeOverlay();
      return;
    }
    const openLightbox =
      document.querySelector(".lightbox-overlay.active, .lightbox.active, .lightbox-overlay[aria-hidden='false']");
    document.body.classList.toggle("mobile-lightbox-open", !!openLightbox);
  }

  function releaseGateLater(){
    // Hold through at least one paint + a short delay so subsequent-work transitions don't flash.
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        setTimeout(function(){
          document.body.classList.remove("mobile-nav-transitioning");
        }, HOLD_AFTER_TRIGGER_MS);
      });
    });
  }

  function handoffTo(fn){
    if(!mq.matches || handoffLock) return;
    handoffLock = true;

    // Cover the whole handoff and suppress visible cards underneath.
    overlay.classList.add("handoff");
    document.body.classList.add("mobile-nav-transitioning");

    // Trigger the site's normal navigation underneath the overlay.
    try{ fn(); }catch(e){}

    // Start overlay fade after one frame so the target card can mount while still hidden.
    requestAnimationFrame(function(){
      closeOverlay();

      // Keep cards hidden until the site's own transition is underway.
      releaseGateLater();

      setTimeout(function(){
        handoffLock = false;
      }, OVERLAY_FADE_MS + HOLD_AFTER_TRIGGER_MS + 80);
    });
  }

  function copySidebarIntoOverlay(){
    if(!mq.matches) return;
    const sidebarWorks = document.getElementById("sidebarWorks");
    if(!sidebarWorks) return;

    const researchItem = WORKS_DATA.find(w => String(w.slug||"").trim().toLowerCase() === "research");
    const researchVisible = !!(researchItem && String(researchItem.site_visible||"yes").trim().toLowerCase() === "yes");
    const htmlTop = [
      '<button type="button" class="sidebar-link" data-nav="info">Info</button>',
      '<button type="button" class="sidebar-link" data-open-work="biography">Biography</button>',
      researchVisible ? '<button type="button" class="sidebar-link" data-open-work="research">Research</button>' : '',
      '<div class="sidebar-divider" aria-hidden="true"></div>'
    ].join("");

    content.innerHTML = '<div class="sidebar-inner">' + htmlTop + sidebarWorks.innerHTML + '</div>';

    content.querySelectorAll("[data-nav='info']").forEach(btn=>{
      btn.addEventListener("click", function(){
        handoffTo(function(){
          const header = document.getElementById("globalHeader");
          if(header) header.click();
        });
      });
    });

    content.querySelectorAll("[data-open-work]").forEach(btn=>{
      btn.addEventListener("click", function(){
        const slug = this.getAttribute("data-open-work");
        handoffTo(function(){
          const target =
            document.querySelector('.card.work-card[data-slug="'+slug+'"]') ||
            document.querySelector('.card.work-card[data-work-slug="'+slug+'"]');

          // Hard-close any currently visible cards first so the next work opens fresh.
          document.querySelectorAll('.card.visible').forEach(function(card){
            if(card !== target){
              card.classList.remove('visible');
              card.classList.add('hidden');
              card.style.display = 'none';
              card.style.visibility = 'hidden';
            }
          });

          if(target && typeof window.showCard === "function"){
            target.classList.add('mobile-pre-enter');
            target.style.visibility = 'hidden';
            target.style.opacity = '0';
            window.showCard(target);
          } else {
            const orig = document.querySelector('#sidebarNav [data-open-work="'+slug+'"]');
            if(orig) orig.click();
          }
        });
      });
    });
  }

  function openOverlay(){
    if(!mq.matches || handoffLock) return;
    copySidebarIntoOverlay();
    overlay.classList.add("open");
    overlay.classList.remove("handoff");
    overlay.setAttribute("aria-hidden", "false");
    overlay.removeAttribute("inert");
    toggle.classList.add("is-open");
    toggle.setAttribute("aria-expanded", "true");
  }

  toggle.addEventListener("click", function(){
    if(!mq.matches || handoffLock) return;
    if(overlay.classList.contains("open")) closeOverlay();
    else openOverlay();
  });

  if(closeBtn){
    closeBtn.addEventListener("click", function(){
      if(!mq.matches || handoffLock) return;
      closeOverlay();
    });
  }

  overlay.addEventListener("click", function(e){
    if(!mq.matches || handoffLock) return;
    if(e.target === overlay) closeOverlay();
  });

  document.addEventListener("keydown", function(e){
    if(!mq.matches || handoffLock) return;
    if(e.key === "Escape" && overlay.classList.contains("open")) closeOverlay();
  });

  window.addEventListener("load", syncLightboxState, {once:true});
  window.addEventListener("resize", syncLightboxState);
})();
</script>

<script>
(function(){
  const mq = window.matchMedia("(max-width: 900px)");
  if(window.__LIGHTWEIGHT_MOBILE_STATE_SYNC) return;
  window.__LIGHTWEIGHT_MOBILE_STATE_SYNC = true;

  const overlay = document.getElementById("mobileNavOverlay");

  function setMenuOpenState(){
    if(!mq.matches){
      document.body.classList.remove("mobile-menu-open");
      return;
    }
    const open = !!(overlay && overlay.classList.contains("open"));
    document.body.classList.toggle("mobile-menu-open", open);
  }

  function setLightboxState(open){
    if(!mq.matches){
      document.body.classList.remove("mobile-lightbox-open");
      return;
    }
    document.body.classList.toggle("mobile-lightbox-open", !!open);
  }

  // Menu button state: infer from user interactions rather than observing the entire DOM
  document.addEventListener("click", function(e){
    const t = e.target;
    if(!t) return;

    // Opening the mobile menu
    if(t.closest && t.closest("#mobileNavToggle")){
      requestAnimationFrame(setMenuOpenState);
      return;
    }

    // Closing the mobile menu
    if(
      (t.closest && t.closest("#mobileNavOverlay .mobile-nav-close")) ||
      (t.id === "mobileNavOverlay")
    ){
      requestAnimationFrame(setMenuOpenState);
      return;
    }

    // Opening lightbox from any media box
    if(t.closest && t.closest(".media-box")){
      setLightboxState(true);
      return;
    }

    // Closing lightbox from close button
    if(t.closest && t.closest(".lightbox-close")){
      setLightboxState(false);
      return;
    }

    // Clicking overlay background closes lightbox in many builds
    if(t.classList && (t.classList.contains("lightbox-overlay") || t.classList.contains("lightbox"))){
      setLightboxState(false);
      return;
    }
  }, true);

  document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){
      setLightboxState(false);
      requestAnimationFrame(setMenuOpenState);
    }
  }, true);

  window.addEventListener("resize", function(){
    if(!mq.matches){
      document.body.classList.remove("mobile-lightbox-open", "mobile-menu-open");
    } else {
      setMenuOpenState();
    }
  });

  window.addEventListener("load", function(){
    setMenuOpenState();
    // Initial lightbox state check only once
    const open = !!document.querySelector(".lightbox-overlay.active, .lightbox.active, .lightbox-overlay[aria-hidden='false']");
    setLightboxState(open);
  }, {once:true});
})();
</script>

<script>
(function(){
  function updateSidebarFade(){
    const nav = document.getElementById("sidebarNav");
    if(!nav) return;
    const inner = nav.querySelector(".sidebar-inner");
    if(!inner) return;

    const hasOverflow = inner.scrollHeight > inner.clientHeight + 1;
    const atTop = inner.scrollTop <= 1;
    const atBottom = (inner.scrollTop + inner.clientHeight) >= (inner.scrollHeight - 1);

    nav.classList.toggle("has-overflow", hasOverflow);
    nav.classList.toggle("has-top-fade", hasOverflow && !atTop);
    nav.classList.toggle("at-bottom", !hasOverflow || atBottom);
  }

  function bindSidebarFade(){
    const nav = document.getElementById("sidebarNav");
    if(!nav || nav.__sidebarFadeBound) return;
    const inner = nav.querySelector(".sidebar-inner");
    if(!inner) return;
    nav.__sidebarFadeBound = true;

    const run = ()=>updateSidebarFade();
    inner.addEventListener("scroll", run, {passive:true});
    window.addEventListener("resize", run);
    document.addEventListener("click", function(e){
      if(e.target.closest && e.target.closest("[data-open-work], [data-nav], #globalHeader, #mobileNavToggle, .mobile-nav-close")){
        setTimeout(run, 0);
        setTimeout(run, 80);
      }
    });
    run();
    requestAnimationFrame(run);
    setTimeout(run, 80);
    setTimeout(run, 180);
  }

  window.addEventListener("load", bindSidebarFade, {once:true});
  window.addEventListener("resize", updateSidebarFade);

  if(typeof window.showCard === "function" && !window.__SIDEBAR_FADE_PATCH){
    const oldShowCard = window.showCard;
    window.__SIDEBAR_FADE_PATCH = true;
    window.showCard = function(card){
      const res = oldShowCard(card);
      requestAnimationFrame(updateSidebarFade);
      setTimeout(updateSidebarFade, 80);
      return res;
    };
  }
})();
</script>

















<script>
(function(){
  if(window.__LIGHTBOX_PRELOAD_HELPER) return;
  window.__LIGHTBOX_PRELOAD_HELPER = true;

  const preloadCache = new Set();

  function preloadList(list){
    (list || []).forEach((src)=>{
      const url = String(src || "").trim();
      if(!url || preloadCache.has(url)) return;
      const img = new Image();
      img.decoding = "async";
      img.src = url;
      preloadCache.add(url);
    });
  }

  function getImagesForMediaBox(box){
    if(!box) return [];
    const gallery = (box.dataset && box.dataset.gallery) ? String(box.dataset.gallery).trim() : "";
    const slug = (box.dataset && box.dataset.workSlug) ? String(box.dataset.workSlug).trim() : "";
    const workObj = (typeof WORKS_DATA !== "undefined") ? WORKS_DATA.find(w => String(w.slug||"") === slug) : null;

    if(gallery){
      return gallery.split(",").map(s=>s.trim()).filter(Boolean);
    }
    if(workObj && workObj.cover_image && String(workObj.cover_image).trim().toUpperCase() !== "NO"){
      return [String(workObj.cover_image).trim()];
    }
    return [];
  }

  function maybePreloadFromEventTarget(target){
    const box = target && target.closest ? target.closest(".media-box") : null;
    if(!box) return;
    preloadList(getImagesForMediaBox(box));
  }

  document.addEventListener("mouseover", (e)=>{ maybePreloadFromEventTarget(e.target); }, true);
  document.addEventListener("focusin", (e)=>{ maybePreloadFromEventTarget(e.target); }, true);
  document.addEventListener("touchstart", (e)=>{ maybePreloadFromEventTarget(e.target); }, {passive:true, capture:true});
  document.addEventListener("click", (e)=>{ maybePreloadFromEventTarget(e.target); }, true);
})();
</script>

    if (!isMobile()) return;
    const active = document.activeElement;
    if (active && overlay.contains(active) && typeof active.blur === "function"){
      active.blur();
    }
    overlay.classList.remove("open", "handoff");
    overlay.setAttribute("aria-hidden", "true");
    overlay.setAttribute("inert", "");
    overlay.style.opacity = "0";
    overlay.style.pointerEvents = "none";
    toggle.classList.remove("is-open");
    toggle.setAttribute("aria-expanded", "false");
    document.body.classList.remove("mobile-menu-open");
  }

  function openWorkBySlug(slug){
    const target =
      document.querySelector('.card.work-card[data-slug="' + slug + '"]') ||
      document.querySelector('.card.work-card[data-work-slug="' + slug + '"]');
    if (!target) return;
    if (typeof window.showCard === "function"){
      target.classList.remove("hidden", "mobile-pre-enter");
      target.classList.add("visible");
      target.style.display = "block";
      target.style.visibility = "visible";
      target.style.opacity = "";
      window.showCard(target);
    } else {
      document.querySelectorAll(".card").forEach(function(card){
        if (card !== target){
          card.classList.remove("visible");
          card.classList.add("hidden");
          card.style.display = "none";
          card.style.visibility = "hidden";
        }
      });
      target.classList.remove("hidden");
      target.classList.add("visible");
      target.style.display = "block";
      target.style.visibility = "visible";
    }
  }

  function goInfo(){
    const info = document.querySelector(".card.info-card") || document.getElementById("infoCard");
    if (!info) return;
    document.querySelectorAll(".card").forEach(function(card){
      if (card !== info){
        card.classList.remove("visible", "mobile-pre-enter");
        card.classList.add("hidden");
        card.style.display = "none";
        card.style.visibility = "hidden";
      }
    });
    info.classList.remove("hidden", "info-ghost", "mobile-pre-enter");
    info.classList.add("visible");
    info.style.display = "block";
    info.style.visibility = "visible";
    info.style.opacity = "1";
    if (typeof window.showCard === "function"){
      window.showCard(info);
    }
  }

  document.addEventListener("click", function(e){
    const t = e.target.closest ? e.target.closest("#mobileNavToggle, #mobileNavOverlay .mobile-nav-close, #mobileNavContent [data-nav='info'], #mobileNavContent [data-open-work]") : null;
    if (!t || !isMobile()) return;

    if (t.matches("#mobileNavToggle")){
      e.preventDefault();
      e.stopPropagation();
      if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
      if (overlay.classList.contains("open")) closeMenu();
      else openMenu();
      return;
    }

    if (t.matches("#mobileNavOverlay .mobile-nav-close")){
      e.preventDefault();
      e.stopPropagation();
      if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
      closeMenu();
      return;
    }

    if (t.matches("#mobileNavContent [data-nav='info']")){
      e.preventDefault();
      e.stopPropagation();
      if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
      closeMenu();
      requestAnimationFrame(goInfo);
      return;
    }

    if (t.matches("#mobileNavContent [data-open-work]")){
      const slug = t.getAttribute("data-open-work");
      e.preventDefault();
      e.stopPropagation();
      if (typeof e.stopImmediatePropagation === "function") e.stopImmediatePropagation();
      closeMenu();
      requestAnimationFrame(function(){ openWorkBySlug(slug); });
      return;
    }
  }, true);

  overlay.addEventListener("click", function(e){
    if (!isMobile()) return;
    if (e.target === overlay) closeMenu();
  }, true);

  window.addEventListener("resize", function(){
    if (!isMobile()){
      overlay.classList.remove("open", "handoff");
      overlay.setAttribute("aria-hidden", "true");
      overlay.setAttribute("inert", "");
      document.body.classList.remove("mobile-menu-open");
      toggle.classList.remove("is-open");
      toggle.setAttribute("aria-expanded", "false");
    }
  });
})();
</script>

</body>
</html>
